rfe_content: '## Problem Statement


  The current RHOAI universal workbench image does not include dependencies required for Reinforcement Learning from Verifiable
  Rewards (RLVR) training workflows. Users who want to develop and experiment with LoRA adapter-based RLVR must manually install
  dependencies, leading to:


  - Friction and time wasted on environment setup

  - Inconsistent dependency versions across users

  - Poor discoverability of RLVR capabilities

  - Example notebooks that don''t work out-of-the-box


  ## Proposed Solution


  Update the RHOAI universal workbench image to include all necessary dependencies for RLVR training workflows. Whatever backend
  and libraries Training Hub exposes for RLVR will be packaged in the workbench image.


  ### Requirements


  - Include all RLVR dependencies that Training Hub requires

  - Ensure compatibility across CUDA, ROCm, and CPU backends

  - Maintain compatibility with existing Training Hub 0.5+ and Kubeflow SDK

  - Keep image size increase reasonable


  ### Desired Outcomes


  - Users can immediately start RLVR development in new workbenches without manual installation

  - Consistent dependency versions across all RHOAI deployments

  - Example notebooks work out-of-the-box

  - Clear documentation of included RLVR capabilities


  ## Acceptance Criteria


  - Universal workbench image includes all required RLVR dependencies from Training Hub

  - Dependencies work across CUDA, ROCm, and CPU backends

  - Example RLVR notebooks run without additional installation steps

  - Documentation updated with included RLVR capabilities

  - ***All required RLVR dependencies*** ***published to AIPCC indexes***


  ## Success Metrics


  - Users can run RLVR training without manual dependency installation

  - Example notebooks execute successfully on fresh workbenches

  - No dependency conflict reports from users


  ##'
