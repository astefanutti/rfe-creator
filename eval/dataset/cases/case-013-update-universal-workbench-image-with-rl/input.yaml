prompt: We need to update the RHOAI universal workbench image to include RLVR (Reinforcement Learning from Verifiable Rewards)
  dependencies. Right now, users who want to experiment with LoRA adapter-based RLVR workflows have to manually install a
  bunch of dependencies, which wastes time and leads to version inconsistencies. Our example notebooks don't even work out-of-the-box
  because of this. Whatever libraries Training Hub exposes for RLVR should just be baked into the workbench image so users
  can get started immediately.
clarifying_context: 'Customers: RHOAI enterprise customers using Training Hub for fine-tuning and alignment workflows, internal
  AI/ML platform teams adopting RLVR for model alignment, partners integrating with OpenShift AI for LLM training pipelines

  Business justification: RLVR is a key emerging capability for LLM alignment and Training Hub 0.5+ is exposing it as a supported
  workflow. Without pre-packaged dependencies, adoption is hampered by setup friction, and example notebooks failing out-of-the-box
  creates a poor first impression that undermines confidence in the platform. Ensuring seamless RLVR support strengthens RHOAI''s
  competitive positioning in the enterprise AI training market.

  User problem: Users who want to develop and experiment with LoRA adapter-based RLVR training must manually install dependencies
  into their workbench environments. This causes friction and wasted time on environment setup, inconsistent dependency versions
  across users and deployments, poor discoverability of RLVR capabilities within the platform, and example notebooks that
  fail to run without additional manual installation steps.

  Scope: Single focused need — updating the universal workbench image to bundle RLVR dependencies. Key considerations include
  ensuring compatibility across CUDA, ROCm, and CPU backends, maintaining compatibility with existing Training Hub 0.5+ and
  Kubeflow SDK, keeping image size increase reasonable, and publishing all required RLVR dependencies to AIPCC indexes.

  Success criteria: Users can run RLVR training workflows immediately on a fresh workbench without any manual dependency installation.
  Example RLVR notebooks execute successfully out-of-the-box. Dependencies work correctly across CUDA, ROCm, and CPU backends.
  No dependency conflict reports from users. All required RLVR dependencies are published to AIPCC indexes. Documentation
  is updated to reflect included RLVR capabilities.'
