rfe_content: '## **Summary**


  Users building agentic applications on RHOAI need reliable multi-turn tool calling through Llama Stack. Today, multi-turn
  tool calling through Llama Stack retains context between turns, but loses reasoning text because of Llama Stack''s chat-completions-based
  implementation of the Responses API. Moreover, tool call parsing is significantly underdeveloped and undertested in vLLM,
  with significant variance by model. These errors compound as context grows across turns — model-level parsing inconsistencies
  accumulate over multi-turn agent conversations, degrading tool calling reliability as conversations progress.


  ## **Problem Statement**


  Multi-turn tool calling through the Llama Stack Responses API is unreliable due to two compounding issues:


  First, tool call parsing in vLLM has significant variance across models. Different models produce tool calls in different
  formats, and vLLM''s per-model parsers are inconsistently developed and tested. A tool call that works reliably with one
  model may fail or produce malformed output with another.


  Second, Llama Stack''s Responses API implementation is built on top of the chat completions interface, which causes reasoning
  text to be lost between turns. When the model''s reasoning context is stripped from the conversation history, subsequent
  turns lack the full context needed for coherent multi-step tool use.


  These two issues compound: as an agent conversation progresses and context grows, small parsing inconsistencies at the vLLM
  layer accumulate, and the loss of reasoning text at the Llama Stack layer further degrades the model''s ability to make
  correct tool calls. The result is that multi-turn agent workflows become progressively less reliable with each turn.


  ## **Affected Customers**


  - BBVA — Multi-million dollar account building internal AI tooling on RHOAI. Multi-turn agent reliability is a requirement
  for their use cases.

  - Citi — Multi-million dollar account. Agentic workflows in regulated financial services require deterministic, stateful
  tool calling with full auditability.


  Both are regulated financial institutions where self-hosted, reliable agent infrastructure is a competitive differentiator
  over hosted API providers.


  ## **Business Justification**


  BBVA and Citi represent multi-million dollar accounts whose agentic AI initiatives depend on reliable multi-turn tool calling
  on a self-hosted stack. These customers chose RHOAI specifically for control, compliance, and data residency — but if tool
  calling degrades over multi-turn conversations, they cannot build production agent workflows. This directly risks deal expansion
  and positions competitors (hosted API providers with integrated, tested tool calling) as the path of least resistance.


  Llama Stack is RHOAI''s answer to OpenAI''s Responses API for orchestration, state, and safety. If tool calling degrades
  progressively across turns, the platform''s agentic story stalls at the "Hello World to Production Agents" user journey.


  ## **Acceptance Criteria**


  - Multi-turn tool calling through the Llama Stack Responses API maintains reliability as conversation context grows, without
  progressive degradation across turns

  - Reasoning text produced by the model is preserved across turns in the Responses API, so that subsequent tool calls benefit
  from the model''s prior reasoning

  - Tool call parsing quality through Llama Stack matches the quality observed when calling vLLM directly via Chat Completions
  for the same model and prompt

  - End-to-end test coverage validates multi-turn tool calling both directly against vLLM and through Llama Stack, across
  multiple supported models


  ## **Success Criteria**


  - A multi-turn tool calling scenario (model calls tool, receives result, reasons, calls another tool) completes successfully
  through Llama Stack without degradation across turns

  - BBVA and Citi can build multi-turn agent workflows on the Responses API without falling back to direct vLLM access'
