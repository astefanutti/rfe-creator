rfe_content: 'This feature tracks the work involved for supporting the creation and management of Ray Jobs over Ray Clusters
  via the CodeFlare stack.


  This would aim to align the CodeFlare SDK to a similar ideology as the KFTO in the sense that a Job is created -> Run ->
  Completed minimizing confusion for Data Scientists meaning they would no longer need to create Ray Clusters then submit
  Jobs.


  This would solve a potential issue where Ray Clusters could be created and kept alive long after the Job being run was completed.


  Initial thoughts:


  - Kueue/RHOAI already supports the Ray Job CR as an integration

  - The bulk of the work to support this change would be conducted in the CodeFlare SDK

  - Some thought has to go into providing scripts to the Ray Jobs so users don''t have need to provide their own Ray images
  if they don''t want to.'
prompt: We need to add RayJob support to the CodeFlare SDK so that data scientists don't have to manually create and manage
  Ray Clusters just to run a job. Right now users create a Ray Cluster, submit a job, and then often forget to tear down the
  cluster afterwards, wasting resources. We want a simpler workflow where they just submit a job and it handles the cluster
  lifecycle automatically, similar to how KFTO works.
clarifying_context: 'Customers: Red Hat OpenShift AI (RHOAI) users, enterprise data science teams using the CodeFlare stack,
  partners leveraging distributed training on OpenShift

  Business justification: This is a strategic investment to improve the CodeFlare SDK user experience and reduce cloud resource
  waste from orphaned Ray Clusters. Aligns RHOAI''s distributed compute story with the simplified job-centric paradigm already
  adopted by KFTO, strengthening competitive positioning for enterprise AI/ML platform deals.

  User problem: Data scientists currently must create a Ray Cluster, submit a job to it, and then manually tear it down after
  completion. This multi-step process is confusing, error-prone, and leads to idle Ray Clusters consuming resources long after
  jobs have completed. Users want a simple submit-and-forget workflow.

  Scope: Single focused need — adding RayJob CR support to the CodeFlare SDK. Key work areas include: (1) SDK changes to support
  RayJob creation and lifecycle management, (2) leveraging existing Kueue/RHOAI integration with the RayJob CR, and (3) providing
  default scripts/configurations so users don''t need to build custom Ray images if they don''t want to.

  Success criteria: Users can create and manage RayJobs directly through the CodeFlare SDK without manually provisioning Ray
  Clusters. The job lifecycle follows a simple Job created -> Run -> Completed pattern. Ray Clusters are automatically cleaned
  up after job completion, eliminating resource waste from orphaned clusters.'
