rfe_content: '**Problem Statement**


  The Kubernetes Operator that manages installation and lifecycle for our Red Hat AI portfolio currently carries the name
  Red Hat OpenShift AI (RHOAI) . As the portfolio expands to include Red Hat AI Inference Server (RHAIIS) with Distributed
  Inference stack on xKS and OpensShift, Platform Operators need an operator name that represents the full scope of what it
  installs and manages. Red Hat AI Operator (RHAI)  is a more accurate, portfolio-aligned name that communicates the operator''s
  role across all products without implying it is specific to any one of them.


  (RHAIIS) distributed inference stack requirement to also work on OpenShift make this name change imperative. As we would
  like to leverage the current RHAOI operator itself for installation and configuration for OpenShift rather than create a
  new experience and product from scratch. A name that reflects the broader portfolio makes this natural and saves us work


  ## Business Alignment


  **Business Value:** A portfolio-aligned operator name reduces onboarding friction for Platform Operators deploying new products  and
  supports a coherent product identity as the portfolio grows. It also reduces  net new work needed and continuous support
  burden for a new thing.


  ## Proposed Solution


  Change the Operator name RHOAI to RHAI


  **Out of scope**


  - Functional changes to the operator''s behavior, capabilities, or supported configurations

  - Changes to the underlying products the operator manages.


  ## Acceptance Criteria


  ### Rename Completeness


  - All customer-facing operator artifacts (e,g: CRDs, API groups, container images, namespace defaults, CLI references) carry
  the new name

  - No customer-facing surface retains the RHOAI  name after the rename is complete.


  ### Upgrade Continuity


  - A Platform Operator running RHAOI can upgrade to RHAI without redeploying managed workloads.

  - Existing Custom Resources created under the RHAOI name continue to reconcile after the upgrade without manual migration.


  ### Observability


  **Must Have**


  - Metrics emitted by the operator reflect the new naming convention.

  - Platform Operators can confirm the rename is complete and the operator is healthy from their existing monitoring setup.


  **Distributed Tracing**


  - Trace attributes emitted by the operator reflect the new name so that traces are consistent with the new identity across
  the request path.


  ### Telemetry


  - update to new name


  ### Regression


  - Existing managed workloads must continue to reconcile, scale, and report health without disruption when the operator name
  changes.


  ### Documentation


  - Installation guide, upgrade guide, and CRD reference updated to reflect the new name. The upgrade guide should include
  explicit steps for transitioning from old name  to name if needed


  ## Affected Customers / Partners




  ## Dependencies




  ## Reference Documents'
