rfe_content: '## Problem Statement


  In 3.4, platform admins can register external model endpoints (e.g., OpenAI, Anthropic, Azure OpenAI, Bedrock, Vertex AI)
  as MaaS-governed models via CLI only — by creating a `MaaSModelRef` CRD pointing to the external provider endpoint. There
  is no dashboard UI for this workflow.


  Without UI support:


  - Admins must use `kubectl`/CLI to register external models into MaaS

  - No discoverability of which external providers are already configured

  - No way to update or remove external model registrations from the dashboard

  - AI engineers cannot distinguish configured external MaaS models from other endpoint types


  This is a gap in the admin experience for MaaS GA. The 3.4 release surfaces external MaaS models in AAE automatically once
  registered, but the registration itself remains CLI-only.


  **This RFE is NOT about Custom Endpoints** (3.4 feature). Custom Endpoints let AI engineers bring ad-hoc, unmanaged external
  connections — no subscription binding, no admin governance. MaaS external model registration requires admin ownership, MaaS
  subscription inclusion, and credential management at the MaaSModelRef level.


  ## User Story


  As a **platform admin**, I want to register an external model provider endpoint (e.g., OpenAI `gpt-5-2`, Anthropic `claude-4-7-sonnet`,
  Azure OpenAI) as a MaaS-governed model via the RHOAI dashboard, so that I can include it in MaaS subscriptions, apply rate
  limits, and manage access — without needing `kubectl` or CLI access.


  ## Acceptance Criteria


  MaaS admin can create a new external MaaS model registration from the Model Deployments page (or dedicated MaaS admin UI
  section)Form captures: provider (dropdown: OpenAI, Anthropic, Azure OpenAI, Bedrock, Vertex AI), endpoint URL, model name/identifier,
  and credential reference (secret or API key reference in namespace)MVP providers - OpenAI, Anthropic, Bedrock

  Stretch - All supportedRegistered external model appears in AAE for AI engineers with correct MaaS subscription access Platform
  admin can view, edit, and delete existing external MaaS model registrations from the dashboardUX reviewed by Celestine Tan
  / design team before implementation## What This Is NOT


  - Not a replacement for the CLI path — CLI must continue to work


  ## Dependencies / Blockers


  - [RHAISTRAT-1295](https://redhat.atlassian.net/browse/RHAISTRAT-1295) — External Model Egress via IGW: backend must land
  first'
prompt: Right now in RHOAI 3.4, platform admins can only register external model endpoints (like OpenAI, Anthropic, Azure
  OpenAI, Bedrock, Vertex AI) as MaaS-governed models through the CLI by creating MaaSModelRef CRDs. There's no dashboard
  UI for this at all. We need to add the ability to register, view, edit, and delete external model endpoint registrations
  directly from the Model Deployments page in the RHOAI dashboard. This is critical for MaaS GA — we can't expect all admins
  to use kubectl for something this fundamental.
clarifying_context: 'Customers: Enterprise platform admin teams adopting RHOAI MaaS for governed AI model access — large financial
  services, healthcare, and tech companies running OpenShift AI at scale (e.g., major banks using Azure OpenAI through MaaS
  governance, Fortune 500 companies standardizing on RHOAI for multi-provider LLM access)

  Business justification: This is a MaaS GA completeness requirement. The 3.4 release already supports external model registration
  via CLI and surfaces them in AAE, but the lack of UI creates an admin experience gap that undermines MaaS adoption. Enterprise
  customers expect full dashboard management for governed model endpoints — CLI-only registration is a barrier to platform
  admin productivity and discoverability.

  User problem: Platform admins must use kubectl/CLI to register external models into MaaS — there is no dashboard discoverability
  of which external providers are configured, no way to update or remove registrations from the UI, and AI engineers cannot
  easily distinguish configured external MaaS models from other endpoint types. This is fundamentally different from Custom
  Endpoints (which are unmanaged, ad-hoc connections without subscription binding or admin governance). MaaS external model
  registration requires admin ownership, MaaS subscription inclusion, and credential management at the MaaSModelRef level
  — all of which currently require CLI.

  Scope: Single focused need — adding UI support for external MaaS model registration CRUD operations on the Model Deployments
  page. Form must capture provider (dropdown: OpenAI, Anthropic, Azure OpenAI, Bedrock, Vertex AI), endpoint URL, model name/identifier,
  and credential reference. MVP providers are OpenAI, Anthropic, and Bedrock; stretch goal includes all supported providers.
  Dependency on RHAISTRAT-1295 (External Model Egress via IGW) backend landing first. CLI path must continue to work — this
  is additive UI, not a replacement.

  Success criteria: Platform admin can create a new external MaaS model registration from the dashboard with provider selection,
  endpoint URL, model identifier, and credential reference; registered external model appears in AAE for AI engineers with
  correct MaaS subscription access; platform admin can view, edit, and delete existing external MaaS model registrations from
  the dashboard; UX is reviewed and approved by design team before implementation.'
