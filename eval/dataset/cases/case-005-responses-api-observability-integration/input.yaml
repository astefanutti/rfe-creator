rfe_content: '## Problem Statement


  Responses API calls on RHOAI are not instrumented with GenAI-specific telemetry. Operations teams cannot trace requests,
  measure token usage, or monitor latency and error rates for Responses API workloads — making it impossible to debug issues,
  optimize costs, or meet SLA requirements.


  ## Affected Customers


  - **Amadeus** — "OpenTelemetry is really important — to trace between agent and LLM" — 500+ AI initiatives requiring observability

  - **T-Mobile** — "Comprehensive observability for agents, token usage, performance metrics"

  - **BofA** — "Comprehensive observability and monitoring of entire LLM inferencing pipeline"

  - **Poste Italiane** — "Real-time model performance visibility across operations"


  ## Business Justification


  Four named customers with large-scale AI deployments require GenAI-specific observability for the Responses API. Amadeus
  alone has 500+ AI initiatives. Without instrumentation, operations teams are blind to Responses API behavior in production.


  ## Acceptance Criteria


  - **[MUST]** Responses API calls traced with GenAI semantic conventions (gen_ai.usage.input_tokens, gen_ai.response.model,
  etc.)

  - **[MUST]** Integration with OTEL for end-to-end trace visibility

  - **[SHOULD]** Integration with MLflow for experiment tracking and tracing

  - **[SHOULD]** Dashboard templates for monitoring usage, latency, and error rates

  - **[COULD]** Per-user/per-agent usage attribution for chargeback


  ## Success Criteria


  - Every Responses API call generates a traceable OTEL span with GenAI attributes

  - Dashboard shows real-time latency, token usage, and error rates'
